version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 2ksolutions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/2ksolutions
      CORS_ORIGINS: http://localhost:5000,http://localhost:3000
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade &&
             python -c 'from app.seed.seed_data import seed_database; from app import create_app; app = create_app(); app.app_context().push(); seed_database()' &&
             gunicorn run:app --bind 0.0.0.0:5000 --workers 4 --timeout 120 --log-level info"

volumes:
  postgres_data:
